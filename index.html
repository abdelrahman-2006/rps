<html>
    <head>
        <title>
            rps
        </title>
        <link rel="stylesheet" href="rock.css">
    </head>
    <body>
        <div class="mainContainer">
            <div id="score">
                score
            </div>
            <div id="numbers">
                <div id="humancount" class="count">0</div>
                <div id="botcount" class="count">0</div>
            </div>
            <div>
                <div id="choice">
                    <div id="keywords">
                        <div class="choice">human choice</div>
                        <div class="choice">bot choice</div>
                    </div>
                    <div id="choices">
                        <div id="humanchoice" class="humanchoices">none</div>
                        <div id="botchoice" class="botchoices">none</div>
                    </div>
                </div>
            </div>
            <div class="buttons">
                <button id="rock">rock</button>
                <button id="paper">paper</button>
                <button id="scissors">scissors</button>
            </div>
        </div>
        <script src="rock.js"></script>
    </body>
</html>
