<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop</title>
</head>
<body>
    <h1>
        cart quantitiy
    </h1>
    <button onclick="console.log('cart quantity: ' + cart_quantity);">
        quantitiy
    </button>
    <button onclick="cart_quantity = cart_quantity + 1; console.log('cart quantity: ' + cart_quantity);">
        add to cart
    </button>
    <button onclick="cart_quantity = cart_quantity + 2; console.log('cart quantity: ' + cart_quantity);">
        2
    </button>
    <button onclick="cart_quantity = cart_quantity + 3; console.log('cart quantity: ' + cart_quantity);">
        3
    </button>
    <button onclick="cart_quantity = 0; console.log('cart was reset'); console.log('cart quantity: ' + cart_quantity);">
        reset cart
    </button> 
    <script>
        let cart_quantity = 0;
    </script>

</body>
</html>
